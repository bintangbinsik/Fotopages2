<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobooth Strip - SMA ISSUDA (Live Data) @binsik.exe</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #121214;
        }
        .brand-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        .photobooth-strip {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body class="text-gray-200 min-h-screen py-10 px-4 flex flex-col items-center">

    <div class="text-center mb-10 max-w-xl">
        <h1 class="brand-font text-3xl font-bold text-white mb-2">📸 ISSUDA Live Photobooth</h1>
        <p class="text-gray-400 text-sm">Menampilkan semua gambar secara real-time dari Apps Script.</p>
        
        <div id="status-message" class="mt-4 text-amber-400 font-semibold animate-pulse">
            Menghubungkan ke Apps Script...
        </div>
    </div>

    <div id="gallery-container" class="flex flex-wrap justify-center gap-10 max-w-7xl"></div>

    <script>
        // URL Google Apps Script Web App Anda
        const scriptUrl = "https://script.google.com/macros/s/AKfycbxG9vhtpRrFkeR7EgtW7odNcdh2TlxLfE9FZ55V05UuBvf0_F-rQy6xH02h_DQQIqBX/exec";

        // Fungsi Rekursif untuk mencari semua file bertipe 'image' di dalam objek JSON
        function extractImages(node) {
            let images = [];
            if (node.type === "image") {
                images.push(node);
            }
            if (node.children && node.children.length > 0) {
                node.children.forEach(child => {
                    images = images.concat(extractImages(child));
                });
            }
            return images;
        }

        // Fungsi untuk memotong array gambar menjadi beberapa kelompok (misal: 4 foto per strip)
        function chunkArray(array, chunkSize) {
            const results = [];
            const arrayCopy = [...array]; // Salin array agar tidak merusak data asli
            while (arrayCopy.length) {
                results.push(arrayCopy.splice(0, chunkSize));
            }
            return results;
        }

        // Fungsi utama untuk mengambil data menggunakan Fetch API
        async function fetchLiveData() {
            const statusMessage = document.getElementById('status-message');
            const container = document.getElementById('gallery-container');

            try {
                // Melakukan request ke Google Script
                const response = await fetch(scriptUrl);
                
                if (!response.ok) {
                    throw new Error("Gagal mengambil data dari server.");
                }

                const rawData = await response.json();
                
                // Ekstrak dan kelompokkan gambar
                const allImages = extractImages(rawData);
                
                if(allImages.length === 0) {
                    statusMessage.textContent = "Tidak ada gambar yang ditemukan di dalam folder.";
                    statusMessage.className = "mt-4 text-red-400 font-semibold";
                    return;
                }

                const photoboothStrips = chunkArray(allImages, 4);
                
                // Sembunyikan pesan loading setelah data berhasil didapat
                statusMessage.style.display = 'none';

                // Render Lembaran Strip Photobooth ke HTML
                photoboothStrips.forEach((strip, index) => {
                    const stripElement = document.createElement('div');
                    stripElement.classList.add('photobooth-strip', 'bg-white', 'text-black', 'p-4', 'pb-6', 'w-72', 'flex', 'flex-col', 'gap-4', 'rounded-sm', 'transform', 'hover:scale-105', 'transition', 'duration-300');
                    
                    // Efek rotasi miring acak agar estetik
                    const randomTilt = (Math.random() * 4 - 2).toFixed(1); 
                    stripElement.style.transform = `rotate(${randomTilt}deg)`;

                    // Render setiap gambar di dalam lembar strip
                    strip.forEach(img => {
                        const imgContainer = document.createElement('div');
                        imgContainer.classList.add('w-full', 'aspect-[3/4]', 'bg-gray-200', 'overflow-hidden', 'relative', 'group');

                        // URL bypass resolusi gambar Google Drive
                        const driveImageUrl = `https://lh3.googleusercontent.com/d/${img.id}=w600`;

                        imgContainer.innerHTML = `
                            <img src="${driveImageUrl}" alt="${img.name}" class="w-full h-full object-cover grayscale-[15%] group-hover:grayscale-0 transition duration-300" loading="lazy" onerror="this.onerror=null; this.src='https://placehold.co/300x400/000000/FFFFFF?text=Gambar+Privat';">
                            <div class="absolute bottom-0 left-0 right-0 bg-black/60 text-[10px] text-white p-1 truncate opacity-0 group-hover:opacity-100 transition-opacity">
                                ${img.name}
                            </div>
                        `;
                        stripElement.appendChild(imgContainer);
                    });

                    // Bagian bawah/Footer Strip Foto
                    const footerStrip = document.createElement('div');
                    footerStrip.classList.add('text-center', 'mt-2', 'border-t', 'border-dashed', 'border-gray-300', 'pt-3');
                    footerStrip.innerHTML = `
                        <p class="brand-font font-bold text-xs tracking-widest text-gray-800">SMA ISSUDA</p>
                        <p class="text-[9px] text-gray-500 font-mono tracking-wider">LIVE DATA • STRIP #${index + 1}</p>
                    `;
                    stripElement.appendChild(footerStrip);

                    container.appendChild(stripElement);
                });

            } catch (error) {
                console.error("Error:", error);
                statusMessage.textContent = "Gagal memuat data. Pastikan status Web App Script Anda sudah di-set ke 'Anyone' (Semua Orang).";
                statusMessage.className = "mt-4 text-red-500 font-bold animate-none";
            }
        }

        // Jalankan fungsi pengambilan data saat halaman dibuka
        window.addEventListener('DOMContentLoaded', fetchLiveData);
    </script>
</body>
</html>
